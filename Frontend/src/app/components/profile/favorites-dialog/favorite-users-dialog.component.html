<h2 mat-dialog-title>Saved Freelancers</h2>

<mat-dialog-content class="favorites-content">
  <div class="state" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading your favorites...</p>
  </div>

  <div class="state error" *ngIf="!loading && errorMessage">
    <p>{{ errorMessage }}</p>
  </div>

  <div class="state" *ngIf="!loading && !errorMessage && favoriteUsers.length === 0">
    <p>No favorites yet. Tap the heart icon on browse cards to save freelancers.</p>
  </div>

  <div class="favorites-grid" *ngIf="!loading && !errorMessage && favoriteUsers.length > 0">
    <app-user-card
      *ngFor="let user of favoriteUsers; trackBy: trackByUserId"
      [user]="user"
      (favoriteToggle)="onFavoriteToggle($event)"
    ></app-user-card>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close>Close</button>
</mat-dialog-actions>
