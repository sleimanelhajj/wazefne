<div class="conversation-list">
  <h2 class="list-title">Messages</h2>

  <div class="conversations">
    <div class="empty-state" *ngIf="filteredConversations.length === 0">
      <p>No conversations yet</p>
    </div>

    <div
      *ngFor="let conv of filteredConversations"
      class="conversation-item"
      [class.active]="conv.id === activeConversationId"
      (click)="selectConversation(conv)"
    >
      <div class="avatar-wrapper">
        <img
          [src]="conv.otherUser.avatar || 'assets/icons/default-avatar.svg'"
          [alt]="conv.otherUser.firstName"
          class="avatar"
        />
      </div>

      <div class="conv-info">
        <div class="conv-top">
          <span class="conv-name">
            {{ conv.otherUser.firstName }} {{ conv.otherUser.lastName }}
          </span>
        </div>
        <p class="conv-preview">{{ conv.lastMessage || 'No messages yet' }}</p>
      </div>
    </div>
  </div>
</div>
