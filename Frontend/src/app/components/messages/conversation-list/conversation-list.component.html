<div class="conversation-list">
  <h2 class="list-title">Messages</h2>

  <div class="conversations">
    <div class="empty-state" *ngIf="filteredConversations.length === 0">
      <div class="empty-icon-wrapper">
        <svg
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#cbd5e1"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          <path d="M10 9h6" />
          <path d="M10 13h4" />
        </svg>
      </div>
      <h3 class="empty-state-title">No conversations</h3>
      <p class="empty-state-text">When you connect with someone, your chats will appear here.</p>
    </div>

    <div
      *ngFor="let conv of filteredConversations"
      class="conversation-item"
      [class.active]="conv.id === activeConversationId"
      (click)="selectConversation(conv)"
    >
      <div class="avatar-wrapper">
        <img
          [src]="conv.otherUser.avatar || 'assets/icons/default-avatar.svg'"
          [alt]="conv.otherUser.firstName"
          class="avatar"
        />
      </div>

      <div class="conv-info">
        <div class="conv-top">
          <span class="conv-name">
            {{ conv.otherUser.firstName }} {{ conv.otherUser.lastName }}
          </span>
        </div>
        <p class="conv-preview">{{ conv.lastMessage || 'No messages yet' }}</p>
      </div>
    </div>
  </div>
</div>
