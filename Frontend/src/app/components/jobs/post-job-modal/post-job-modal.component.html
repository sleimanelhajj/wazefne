<div class="modal-overlay" (click)="close()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>Post a New Job</h2>
      <button class="close-btn" (click)="close()">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <div class="modal-body">
      <div class="error-banner" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <div class="form-group">
        <label>Job Title <span class="required">*</span></label>
        <input
          type="text"
          [(ngModel)]="title"
          placeholder="e.g. Need a full-stack developer"
          [disabled]="isSubmitting"
        />
      </div>

      <div class="form-group">
        <label>Description <span class="required">*</span></label>
        <textarea
          [(ngModel)]="description"
          placeholder="Describe what you need done..."
          rows="4"
          [disabled]="isSubmitting"
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>Category <span class="required">*</span></label>
          <select [(ngModel)]="category" [disabled]="isSubmitting">
            <option *ngFor="let cat of categories" [value]="cat">
              {{ cat }}
            </option>
          </select>
        </div>

        <div class="form-group half">
          <label>Location <span class="required">*</span></label>
          <select [(ngModel)]="location" [disabled]="isSubmitting">
            <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Estimated Budget (Optional)</label>
        <div class="budget-input">
          <span class="currency-symbol">$</span>
          <input
            type="number"
            [(ngModel)]="budget"
            placeholder="0.00"
            min="0"
            [disabled]="isSubmitting"
          />
        </div>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="cancel-btn" (click)="close()" [disabled]="isSubmitting">Cancel</button>
      <button class="submit-btn" (click)="submitJob()" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Post Job</span>
        <span *ngIf="isSubmitting" class="spinner"></span>
      </button>
    </footer>
  </div>
</div>
