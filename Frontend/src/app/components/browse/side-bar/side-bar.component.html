<aside class="filter-sidebar">
  <section class="filter-card">
    <header class="card-header">
      <img src="assets/icons/location.svg" alt="Location" />
      <h3>Location</h3>
    </header>
    <div class="card-body">
      <mat-form-field appearance="outline" class="full-width-field">
        <mat-label>All Locations</mat-label>
        <mat-select
          [(ngModel)]="selectedLocation"
          (selectionChange)="selectLocation(selectedLocation)"
        >
          <mat-option *ngFor="let loc of locationOptions" [value]="loc.value">
            {{ loc.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </section>

  <section class="filter-card">
    <header class="card-header">
      <img src="assets/icons/category.svg" alt="Category" />
      <h3>Category</h3>
    </header>
    <div class="card-body">
      <mat-form-field appearance="outline" class="full-width-field">
        <mat-label>All Categories</mat-label>
        <mat-select
          [(ngModel)]="selectedCategory"
          (selectionChange)="selectCategory(selectedCategory)"
        >
          <mat-option value="">All Categories</mat-option>
          <mat-option *ngFor="let category of categories" [value]="category.label">
            {{ category.label }} ({{ category.count }})
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </section>

  <section class="filter-card">
    <header class="card-header">
      <img src="assets/icons/price-range.svg" alt="Price Range" />
      <h3>Price Range / hr</h3>
    </header>
    <div class="card-body price-body">
      <div class="range-track">
        <div class="range-slider">
          <div class="range-rail"></div>
          <div class="range-fill" [ngStyle]="priceFillStyle"></div>
          <input
            type="range"
            [min]="priceFloor"
            [max]="priceCeiling"
            [(ngModel)]="priceMin"
            (input)="clampPrices()"
          />
          <input
            type="range"
            [min]="priceFloor"
            [max]="priceCeiling"
            [(ngModel)]="priceMax"
            (input)="clampPrices()"
          />
        </div>
        <div class="range-labels">
          <span>${{ priceMin }}</span>
          <span>${{ priceMax }}</span>
        </div>
      </div>
      <div class="input-row">
        <label>
          <span>$</span>
          <input
            type="number"
            [min]="priceFloor"
            [max]="priceCeiling"
            [(ngModel)]="priceMin"
            (change)="clampPrices()"
            (keypress)="preventNegative($event)"
          />
        </label>
        <span class="dash"></span>
        <label>
          <span>$</span>
          <input
            type="number"
            [min]="priceFloor"
            [max]="priceCeiling"
            [(ngModel)]="priceMax"
            (change)="clampPrices()"
            (keypress)="preventNegative($event)"
          />
        </label>
      </div>
    </div>
  </section>

  <section class="filter-card">
    <header class="card-header">
      <img src="assets/icons/rating.svg" alt="Rating" />
      <h3>Rating</h3>
    </header>
    <div class="card-body rating-body">
      <div class="rating-stars">
        <button
          type="button"
          class="star-button"
          *ngFor="let star of starArray"
          [class.active]="star <= selectedRating"
          (click)="setRating(star)"
        >
          <img src="assets/icons/star.svg" alt="star" />
        </button>
        <span class="rating-label">{{ selectedRating }}</span>
      </div>
    </div>
  </section>
</aside>
