<div class="booking-card">
  <div class="card-body">
    <div class="card-left">
      <div class="avatar-wrapper">
        <img *ngIf="otherUserAvatar" [src]="otherUserAvatar" [alt]="otherUserName" class="avatar" />
        <div *ngIf="!otherUserAvatar" class="avatar avatar-placeholder">
          {{ otherUserName.charAt(0) }}
        </div>
      </div>
      <div class="card-info">
        <div class="name-row">
          <span class="name">{{ otherUserName }}</span>
          <span class="status-badge" [ngClass]="getStatusClass()">
            <span class="status-dot"></span>
            {{ statusLabel }}
          </span>
        </div>
        <div class="service">{{ booking.title }}</div>
        <div class="meta-row">
          <span class="meta-item">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#9ca3af"
              stroke-width="2"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            {{ formattedDate }}
          </span>
        </div>
      </div>
    </div>

    <div class="card-right">
      <div class="price-block">
        <span class="price-label">{{ priceLabel }}</span>
        <span class="price">{{ price }}</span>
      </div>
      <div class="actions">
        <button
          *ngFor="let action of actions"
          class="action-btn"
          [ngClass]="'action-' + action.style"
          (click)="onAction(action.action)"
        >
          {{ action.label }}
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Done confirmation modal -->
<div class="modal-overlay" *ngIf="showDoneModal" (click)="cancelDone()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-icon">🎉</div>
    <h3 class="modal-title">Mark as Done?</h3>
    <p class="modal-text">
      Are you sure you want to mark
      <strong>"{{ booking.title }}"</strong> as completed? This will move it to your past bookings.
    </p>
    <div class="modal-actions">
      <button class="action-btn action-outline" (click)="cancelDone()">Not Yet</button>
      <button class="action-btn action-success" (click)="confirmDone()">Yes, Mark Done</button>
    </div>
  </div>
</div>
