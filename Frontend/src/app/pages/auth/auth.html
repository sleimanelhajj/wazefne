<div class="auth-container">
  <!-- Left Side -->
  <div class="left-panel">
    <div class="overlay"></div>
    <div class="content">
      <div class="logo">
        <img src="assets/logo/logo.png" alt="Sta2jerne" />
      </div>

      <div class="hero-text">
        <h1>Find the help you need, when you need it.</h1>
        <p>
          From expert butlers to skilled freelancers, discover trusted professionals across Lebanon
          ready to assist you today.
        </p>
      </div>

      <div class="trust-badge">
        <div class="avatars">
          <div class="avatar"></div>
          <div class="avatar"></div>
          <div class="avatar"></div>
        </div>
        <span>Trusted by 10,000+ in Beirut</span>
      </div>
    </div>
  </div>

  <!-- Right Side -->
  <div class="right-panel">
    <!-- Mobile-only logo -->
    <div class="mobile-logo">
      <img src="assets/logo/logo.png" alt="Wazefne" />
    </div>

    <div class="auth-card">
      @if (isSignUp) {
        <clerk-sign-up [props]="{ signInUrl: '/sign-in', fallbackRedirectUrl: '/setup-profile' }" />
      } @else {
        <clerk-sign-in
          [props]="{
            signUpUrl: '/sign-up',
            fallbackRedirectUrl: '/browse',
            signUpFallbackRedirectUrl: '/setup-profile',
          }"
        />
      }
    </div>
  </div>
</div>
