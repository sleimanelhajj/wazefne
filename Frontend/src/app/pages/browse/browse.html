<div class="browse-page">
  <app-top-bar [showSearch]="true"></app-top-bar>

  <div class="browse-layout">
    <!-- Sidebar - Desktop: Column, Mobile: Modal -->
    <aside class="sidebar-column" [class.mobile-modal]="mobileFiltersOpen">
      <div class="mobile-modal-header" *ngIf="mobileFiltersOpen">
        <h3>Filters</h3>
        <button class="close-btn" (click)="toggleMobileFilters()">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <app-side-bar [users]="allUsers"></app-side-bar>
      <div class="mobile-modal-footer" *ngIf="mobileFiltersOpen">
        <button class="apply-btn" (click)="toggleMobileFilters()">Apply Filters</button>
      </div>
    </aside>

    <!-- Mobile modal overlay -->
    <div class="modal-overlay" *ngIf="mobileFiltersOpen" (click)="toggleMobileFilters()"></div>

    <!-- Mobile Filter Floating Button -->
    <button class="mobile-filter-btn" (click)="toggleMobileFilters()">
      Filters
    </button>

    <main class="results-column">
      <!-- Skeleton cards while loading -->
      <div class="results-grid" *ngIf="loading">
        <div class="skeleton-user-card" *ngFor="let i of [1, 2, 3, 4, 5, 6]">
          <div class="skeleton-card-img shimmer"></div>
          <div class="skeleton-card-body">
            <div class="skeleton-line w-60 shimmer"></div>
            <div class="skeleton-line w-80 shimmer"></div>
            <div class="skeleton-chips-row">
              <div class="skeleton-chip shimmer"></div>
              <div class="skeleton-chip shimmer"></div>
            </div>
            <div class="skeleton-card-footer">
              <div class="skeleton-line w-30 shimmer"></div>
              <div class="skeleton-line w-40 shimmer"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Real cards -->
      <ng-container *ngIf="!loading">
        <!-- Result count bar -->
        <div class="results-meta">
          <span *ngIf="!activeSearch">{{ users.length }} talent{{ users.length !== 1 ? 's' : '' }} available</span>
          <span *ngIf="activeSearch">
            {{ users.length }} result{{ users.length !== 1 ? 's' : '' }} for
            <strong>"{{ activeSearch }}"</strong>
          </span>
        </div>

        <div class="results-grid" *ngIf="users.length > 0">
          <app-user-card
            *ngFor="let user of users"
            [user]="user"
            (favoriteToggle)="onFavoriteToggle($event)"
          ></app-user-card>
        </div>

        <!-- Empty state -->
        <div class="browse-empty" *ngIf="users.length === 0">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p class="browse-empty-title">No talents found</p>
          <p class="browse-empty-desc" *ngIf="activeSearch">
            No results for <strong>"{{ activeSearch }}"</strong>. Try a different name, skill, or category.
          </p>
          <p class="browse-empty-desc" *ngIf="!activeSearch">
            Try adjusting your filters.
          </p>
        </div>
      </ng-container>
    </main>
  </div>
</div>
