<div [class.mobile-chat-hide]="!!activeConversation">
  <app-top-bar></app-top-bar>
</div>

<div class="messages-shell" [class.mobile-chat-active]="!!activeConversation">
  <div class="conv-list-wrapper">
    <app-conversation-list
      [conversations]="conversations"
      [activeConversationId]="activeConversation?.id || null"
      (conversationSelected)="onConversationSelected($event)"
    ></app-conversation-list>
  </div>

  <div class="chat-panel">
    @if (activeConversation) {
      <app-chat-header
        [contact]="activeContact"
        [showBack]="true"
        (backClicked)="onBackToList()"
      ></app-chat-header>
      <app-chat-messages
        [messages]="messages"
        [currentUserId]="currentUserId"
        [otherUserAvatar]="activeContact?.avatar || 'assets/icons/default-avatar.svg'"
        [loading]="messagesLoading"
      ></app-chat-messages>
      <app-message-input
        (messageSent)="onMessageSent($event)"
        (createOffer)="onCreateOffer()"
      ></app-message-input>
    } @else {
      <div class="no-chat-placeholder">
        <div class="no-chat-icon"></div>
        <h3>Select a conversation</h3>
        <p>Choose a conversation from the left to start messaging.</p>
      </div>
    }
  </div>
</div>

<!-- Create Offer Modal -->
<app-create-offer-modal
  *ngIf="showOfferModal"
  [recipientName]="activeContact?.name || ''"
  [recipientHourlyRate]="recipientHourlyRate"
  [recipientAvatar]="activeContact?.avatar || ''"
  (submitOffer)="onSubmitOffer($event)"
  (close)="showOfferModal = false"
></app-create-offer-modal>
